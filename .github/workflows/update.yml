name: Hourly Financial Data Auto Updater

on:
  schedule:
    - cron: '0 * * * *' # 每小時整點自動執行一次 (UTC 時間)
  workflow_dispatch: # 允許你在 GitHub 介面上手動點擊執行

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - name: 檢出專案代碼
      uses: actions/checkout@v4

    - name: 強制設定標準穩定 Python 3.10 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 🚀 放棄前衛的 3.14，改用最成熟、絕對不會發生底層衝突的 3.10

    - name: 執行更新腳本
      run: python update_prices.py

    - name: 自動安全檢查與無感提交
      run: |
        git config --global --add safe.directory /github/workspace
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        if git diff-index --quiet HEAD --; then
          echo "數據無變動，完美結束！"
        else
          git commit -m "Automated hourly financial data update [skip ci]"
          git push
        fi
