name: Hourly Financial Data Auto Updater

on:
  schedule:
    - cron: '0 * * * *' # 每小時整點自動執行一次 (UTC 時間)
  workflow_dispatch: # 允許你在 GitHub 介面上手動點擊執行

# 🚀 在這裡加入全域環境變數，強制 GitHub Actions 使用 Node.js 24 執行所有 Actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - name: 檢出專案代碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: 執行更新腳本
      run: python update_prices.py

    - name: 將最新價格自動提交並推送到 GitHub Pages
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        git diff-index --quiet HEAD || git commit -m "Automated hourly financial data update [skip ci]"
        git push
