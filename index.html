    <script>
        /* 您原本網頁內包含的資產配置輔助工具 JavaScript 計算邏輯（如 calcRebalance 等）均完整保留 */
        function calcRebalance() {
            let us = parseFloat(document.getElementById('rb_us').value);
            let tw = parseFloat(document.getElementById('rb_tw').value);
            let targetUsRatio = parseFloat(document.getElementById('rb_ratio_us').value) / 100;
            
            let total = us + tw;
            if (total <= 0) {
                document.getElementById('result-rebalance').innerHTML = `❌ 請輸入正確的資產總額。`;
                return;
            }
            
            let currentUsRatio = us / total;
            let idealUs = total * targetUsRatio;
            let idealTw = total * (1 - targetUsRatio);
            let diffUs = idealUs - us;
            
            let report = `⚖️ <strong>目前總資產：</strong>$${Math.round(total).toLocaleString()} 元<br>`;
            report += `📊 <strong>目前美股權重：</strong>${(currentUsRatio * 100).toFixed(1)}% (理想 ${document.getElementById('rb_ratio_us').value}%)<br>`;
            
            if (Math.abs(diffUs) < 100) {
                report += `✨ <strong>再平衡偏離度極低：</strong>目前不需進行大幅度調整。`;
            } else if (diffUs > 0) {
                report += `🛒 <strong>調整策略 (美股偏低)：</strong>建議加碼美股 <strong>$${Math.round(diffUs).toLocaleString()}</strong> 元，或由台日股中換股調整...`;
            }
            document.getElementById('result-rebalance').innerHTML = report;
        }
    </script>
